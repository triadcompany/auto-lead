server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Service worker e manifest NUNCA podem ficar em cache — o navegador precisa
    # revalidar a cada fetch pra detectar deploys novos. Sem isso, o browser
    # cacheava o sw.js por 1 ano (regra abaixo casava com *.js também) e o app
    # ficava preso numa versão antiga até o usuário limpar o cache manualmente.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }
    location = /manifest.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # Serve static assets with long cache (arquivos com hash no nome — seguros
    # pra cache imutável, já que o nome muda quando o conteúdo muda)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # All routes → SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
}
